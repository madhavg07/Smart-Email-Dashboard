services:
  - type: web
    name: smart-email-dashboard-web
    env: python
    branch: main
    autoDeploy: true
    buildCommand: cd Backend && pip install -r requirements.txt
    startCommand: cd Backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT

  - type: worker
    name: smart-email-dashboard-worker
    env: python
    branch: main
    autoDeploy: true
    buildCommand: cd Backend && pip install -r requirements.txt
    # --beat embeds the scheduler in the worker so scheduled tasks actually fire
    # (auto content-optimize every 6h, nightly suppression, weekly retrain).
    # Embedded beat is safe here because there is exactly ONE worker instance.
    startCommand: cd Backend && celery -A celery_tasks.tasks worker --beat --loglevel=info --concurrency=2
